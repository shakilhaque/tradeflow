<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Set Successfully</title>
</head>
<body style="margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#f3f4f6;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:40px 20px;">
    <tr>
      <td align="center">
        <table role="presentation" width="520" cellpadding="0" cellspacing="0"
               style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
          <tr>
            <td style="background:#16a34a;padding:28px 40px;text-align:center;">
              <h1 style="margin:0;color:#fff;font-size:22px;">Password Set Successfully</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 40px;color:#111827;font-size:15px;line-height:1.6;">
              <p style="margin:0 0 16px;">Hi <strong>{{ user.name }}</strong>,</p>
              <p style="margin:0 0 24px;">
                Your password for <strong>{{ app_name }}</strong> has been set.
                You can now log in to your account.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" align="center">
                <tr>
                  <td style="border-radius:8px;background:#2563eb;">
                    <a href="{{ login_url }}"
                       style="display:inline-block;padding:12px 32px;color:#fff;
                              text-decoration:none;font-weight:600;font-size:15px;border-radius:8px;">
                      Log In Now &rarr;
                    </a>
                  </td>
                </tr>
              </table>
              <p style="margin:28px 0 0;font-size:13px;color:#6b7280;">
                If you did not make this change, contact support immediately.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
