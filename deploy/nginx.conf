# TradeFlow — Nginx site config
# Served on a DEDICATED PORT (8080) so it never collides with the other
# domain-based sites on port 80. Access at:  http://103.231.238.199:8080
# Place at: /etc/nginx/sites-available/tradeflow
# Enable:   ln -s /etc/nginx/sites-available/tradeflow /etc/nginx/sites-enabled/
#           nginx -t && systemctl reload nginx

server {
    listen 8080;
    server_name _;

    client_max_body_size 25M;          # allow CSV/Excel imports

    # ── React frontend (Vite build) ──────────────────────────────────────────
    root /var/www/html/tradeflow/frontend/dist;
    index index.html;

    # SPA fallback — any unknown path returns index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must NEVER be browser-cached (Vite asset filenames are
    # content-hashed; the browser must re-read index.html to learn new names).
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    # ── Django API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        expires off;
    }

    # ── Django admin ─────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django static files (admin CSS/JS, DRF browsable API) ───────────────
    location /static/ {
        alias /var/www/html/tradeflow/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Django media uploads ────────────────────────────────────────────────
    location /media/ {
        alias /var/www/html/tradeflow/backend/media/;
        expires 7d;
    }

    # ── Frontend build assets (long cache) ──────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Misc hardening ──────────────────────────────────────────────────────
    location ~ /\. { deny all; }       # block dotfiles
    server_tokens off;
}
