# Iffaa Accounting — Nginx site config
# Place at: /etc/nginx/sites-available/iffaa-acc
# Then: ln -s /etc/nginx/sites-available/iffaa-acc /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name iffaa.netspheresolutionsltd.com;

    client_max_body_size 25M;          # allow CSV/Excel imports

    # ── React frontend (Vite build) ──────────────────────────────────────────
    root /var/www/html/nsl-iffaa-application/frontend/dist;
    index index.html;

    # SPA fallback — any unknown path returns index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must NEVER be browser-cached. The Vite bundle
    # filenames (in /assets/) are content-hashed, so a new deploy produces
    # new filenames — but only if the browser actually re-reads index.html
    # to learn the new names. Without this, users keep loading the old
    # bundle until they hard-refresh.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
    }

    # ── Django API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # API responses must never be cached — a single failed first-load
        # otherwise sticks in the browser cache (see the "Network Error
        # until hard refresh" bug on the pricing page).
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
        expires off;
    }

    # ── Django admin ─────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django static files (admin CSS/JS, DRF browsable API) ───────────────
    location /static/ {
        alias /var/www/html/nsl-iffaa-application/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Django media uploads ────────────────────────────────────────────────
    location /media/ {
        alias /var/www/html/nsl-iffaa-application/backend/media/;
        expires 7d;
    }

    # ── Frontend build assets (long cache) ──────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Misc hardening ──────────────────────────────────────────────────────
    location ~ /\. { deny all; }       # block dotfiles
    server_tokens off;
}
